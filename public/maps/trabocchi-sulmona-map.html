<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trabocchi Coast, Atri Calanchi & Sulmona Map | followtheflor.com</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #fff; }
  #map { width: 100%; height: 500px; border-radius: 12px; border: 2px solid #ff2d78; }
  .map-container { padding: 20px; max-width: 900px; margin: 0 auto; }
  h2 { font-size: 1.4rem; margin-bottom: 12px; color: #ff2d78; }
  .legend { display: flex; gap: 20px; flex-wrap: wrap; margin-top: 16px; padding: 16px; background: #141414; border-radius: 8px; border: 1px solid #222; }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 0.9rem; color: #ccc; }
  .legend-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
  .legend-line { width: 24px; height: 4px; border-radius: 2px; flex-shrink: 0; }
  .leaflet-popup-content-wrapper { background: #1a1a1a; color: #fff; border-radius: 8px; border: 1px solid #ff2d78; }
  .leaflet-popup-tip { background: #1a1a1a; }
  .leaflet-popup-content { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.5; }
  .leaflet-popup-content strong { color: #ff2d78; }
  .leaflet-popup-content .popup-detail { color: #aaa; font-size: 12px; margin-top: 4px; }
  @media (max-width: 600px) { #map { height: 400px; } .legend { flex-direction: column; gap: 10px; } }
</style>
</head>
<body>
<div class="map-container">
  <h2>Trabocchi Coast, Atri Calanchi & Sulmona</h2>
  <div id="map"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background: #ff2d78;"></div><span>Coast</span></div>
    <div class="legend-item"><div class="legend-dot" style="background: #00e5ff;"></div><span>Towns</span></div>
    <div class="legend-item"><div class="legend-dot" style="background: #ffd600;"></div><span>Nature</span></div>
    <div class="legend-item"><div class="legend-line" style="background: #ff2d78; opacity: 0.5;"></div><span>Day Trip Route</span></div>
  </div>
</div>
<script>
var map = L.map('map', { scrollWheelZoom: false }).setView([42.3, 14.1], 10);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; OpenStreetMap', maxZoom: 18
}).addTo(map);

function makeIcon(emoji, color) {
  return L.divIcon({
    html: '<div style="background:'+color+';width:28px;height:28px;border-radius:50%;border:3px solid #fff;display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 2px 8px rgba(0,0,0,0.4);">'+emoji+'</div>',
    iconSize: [28, 28], iconAnchor: [14, 14], className: ''
  });
}

L.marker([42.1760, 14.3930], {icon: makeIcon('🎣', '#ff2d78')}).addTo(map)
  .bindPopup('<strong>Costa dei Trabocchi</strong><br>Ancient fishing platforms, seafood restaurants over the waves<div class="popup-detail">Via Verde cycling path runs 40km along the coast</div>');

L.marker([42.2100, 14.4200], {icon: makeIcon('🍝', '#ff2d78')}).addTo(map)
  .bindPopup('<strong>Trabocco Restaurants</strong><br>Book ahead! Fixed menu of the day\'s catch<div class="popup-detail">Try Punta Tufano or Pesce Palombo</div>');

L.marker([42.5780, 13.9790], {icon: makeIcon('🌅', '#ffd600')}).addTo(map)
  .bindPopup('<strong>Atri Calanchi</strong><br>Badlands nature reserve — stunning at sunset<div class="popup-detail">Walking trails along the rim. 20 min from coast.</div>');

L.marker([42.5810, 13.9810], {icon: makeIcon('🏛️', '#00e5ff')}).addTo(map)
  .bindPopup('<strong>Atri</strong><br>Medieval town with De Litio frescoes<div class="popup-detail">Cathedral + local Montepulciano d\'Abruzzo wine</div>');

L.marker([42.0480, 13.9260], {icon: makeIcon('🍬', '#00e5ff')}).addTo(map)
  .bindPopup('<strong>Sulmona</strong><br>Confetti capital, Ovid\'s birthplace, Annunziata cloister<div class="popup-detail">Best base for coast + mountains. ~1hr from Trabocchi.</div>');

L.marker([42.0880, 14.0240], {icon: makeIcon('🏰', '#00e5ff')}).addTo(map)
  .bindPopup('<strong>Celano</strong><br>Medieval castle en route between Sulmona and coast<div class="popup-detail">Worth a quick stop for the fortress views</div>');

var route = [
  [42.0480, 13.9260],
  [42.0880, 14.0240],
  [42.1760, 14.3930],
  [42.5780, 13.9790],
];
L.polyline(route, { color: '#ff2d78', weight: 3, opacity: 0.4, dashArray: '10, 8' }).addTo(map);
map.fitBounds(L.latLngBounds(route), {padding: [40, 40]});
</script>
</body>
</html>
