<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
  <title id="title">Timeline: TFR Recast applies (Dec 2024) → Two USDT transfers (Jan 2025) → Arbiter ruling (2026) → MFSA inspections, FIAU thematic reviews, more cases (next 12 months)</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0510"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff2db7" stop-opacity="0.4"/>
      <stop offset="0.5" stop-color="#ff2db7"/>
      <stop offset="1" stop-color="#00f0ff" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="g" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="500" fill="url(#bg)"/>

  <!-- Title -->
  <text x="800" y="55" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="24" font-weight="700" fill="#ffffff" letter-spacing="2">THE FIRST 17 MONTHS OF THE TFR RECAST</text>
  <text x="800" y="83" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#00f0ff" opacity="0.85">From rule going live to the first European court ruling — and what comes next</text>

  <!-- Main timeline line -->
  <line x1="120" y1="260" x2="1480" y2="260" stroke="url(#line-grad)" stroke-width="3" filter="url(#g)"/>

  <!-- Tick marks (subtle) -->
  <g stroke="#1f1f1f" stroke-width="1">
    <line x1="200"  y1="250" x2="200"  y2="270"/>
    <line x1="600"  y1="250" x2="600"  y2="270"/>
    <line x1="1000" y1="250" x2="1000" y2="270"/>
    <line x1="1400" y1="250" x2="1400" y2="270"/>
  </g>

  <!-- ======== EVENT 1: 30 Dec 2024 ======== -->
  <g>
    <circle cx="200" cy="260" r="16" fill="#0a0510" stroke="#ff2db7" stroke-width="3" filter="url(#g)"/>
    <circle cx="200" cy="260" r="6" fill="#ff2db7"/>
    <!-- Date above -->
    <text x="200" y="200" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#ff2db7" font-weight="700" letter-spacing="2">30 DEC 2024</text>
    <!-- Label below -->
    <line x1="200" y1="285" x2="200" y2="310" stroke="#ff2db7" stroke-width="1" opacity="0.6"/>
    <text x="200" y="335" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="16" font-weight="700" fill="#ffffff">TFR Recast applies</text>
    <text x="200" y="360" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" fill="#a0aec0">Reg (EU) 2023/1113</text>
    <text x="200" y="378" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" fill="#a0aec0">live for crypto</text>
  </g>

  <!-- ======== EVENT 2: Jan 2025 ======== -->
  <g>
    <circle cx="600" cy="260" r="16" fill="#0a0510" stroke="#ff2db7" stroke-width="3" filter="url(#g)"/>
    <circle cx="600" cy="260" r="6" fill="#ff2db7"/>
    <text x="600" y="200" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#ff2db7" font-weight="700" letter-spacing="2">JAN 2025</text>
    <line x1="600" y1="285" x2="600" y2="310" stroke="#ff2db7" stroke-width="1" opacity="0.6"/>
    <text x="600" y="335" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="16" font-weight="700" fill="#ffffff">Two USDT transfers</text>
    <text x="600" y="360" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" fill="#a0aec0">Maltese CASP → scammer</text>
    <text x="600" y="378" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" fill="#a0aec0">No verification done</text>
  </g>

  <!-- ======== EVENT 3: 2026 Arbiter ruling ======== -->
  <g>
    <circle cx="1000" cy="260" r="22" fill="#0a0510" stroke="#ff2db7" stroke-width="4" filter="url(#g)"/>
    <circle cx="1000" cy="260" r="8" fill="#ff2db7"/>
    <text x="1000" y="200" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#ff2db7" font-weight="700" letter-spacing="2">MAY 2026 · NOW</text>
    <line x1="1000" y1="290" x2="1000" y2="310" stroke="#ff2db7" stroke-width="1" opacity="0.6"/>
    <text x="1000" y="335" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="16" font-weight="700" fill="#ff2db7">Arbiter ruling</text>
    <text x="1000" y="360" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" fill="#a0aec0">Civil liability + 40% award</text>
    <text x="1000" y="378" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" fill="#a0aec0">Notified to MFSA & FIAU</text>
  </g>

  <!-- ======== EVENT 4: Next 12 months ======== -->
  <g>
    <circle cx="1400" cy="260" r="16" fill="#0a0510" stroke="#00f0ff" stroke-width="3" stroke-dasharray="3 3" filter="url(#g)"/>
    <circle cx="1400" cy="260" r="6" fill="#00f0ff"/>
    <text x="1400" y="200" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="12" fill="#00f0ff" font-weight="700" letter-spacing="2">NEXT 12 MONTHS</text>
    <line x1="1400" y1="285" x2="1400" y2="310" stroke="#00f0ff" stroke-width="1" opacity="0.6"/>
    <text x="1400" y="335" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="16" font-weight="700" fill="#ffffff">What comes next</text>
    <text x="1400" y="360" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" fill="#a0aec0">MFSA inspections · FIAU</text>
    <text x="1400" y="378" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" fill="#a0aec0">thematic review · more cases</text>
  </g>

  <!-- Bottom annotation -->
  <text x="800" y="450" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" fill="#6b7280">EBA Travel Rule Guidelines apply across the EU. Maltese precedent today, Berlin and Dublin reading it next month.</text>
</svg>
