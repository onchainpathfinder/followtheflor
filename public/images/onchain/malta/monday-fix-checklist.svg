<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
  <title id="title">Monday morning Travel Rule fix list — five operational items every CASP should push through this week</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0510"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <filter id="g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <!-- Header -->
  <rect x="80" y="60" width="1440" height="100" rx="8" fill="#000000" stroke="#ff2db7" stroke-width="2" filter="url(#g)"/>
  <text x="800" y="105" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="32" font-weight="700" fill="#ffffff" letter-spacing="3">MONDAY MORNING FIX LIST</text>
  <text x="800" y="135" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="14" fill="#ff2db7" letter-spacing="2">5 things every EU CASP should push through this week</text>

  <!-- Item 1 -->
  <g>
    <rect x="80" y="200" width="1440" height="120" rx="8" fill="#0a0510" stroke="#ff2db7" stroke-width="1.5" opacity="0.95"/>
    <!-- Checkbox -->
    <rect x="120" y="235" width="50" height="50" rx="6" fill="none" stroke="#ff2db7" stroke-width="2.5"/>
    <path d="M 130 260 L 145 275 L 165 245" fill="none" stroke="#ff2db7" stroke-width="3.5" filter="url(#g)"/>
    <!-- Number -->
    <text x="210" y="245" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#ff2db7" letter-spacing="2">01</text>
    <!-- Title -->
    <text x="210" y="278" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="#ffffff">Kill the tick-box-only flow above €1,000</text>
    <!-- Body -->
    <text x="210" y="305" font-family="'Plus Jakarta Sans', sans-serif" font-size="14" fill="#a0aec0">Real verification on file before the transfer leaves. Satoshi test, signed message, or wallet-attribution provider.</text>
  </g>

  <!-- Item 2 -->
  <g>
    <rect x="80" y="340" width="1440" height="120" rx="8" fill="#0a0510" stroke="#ff2db7" stroke-width="1.5" opacity="0.95"/>
    <rect x="120" y="375" width="50" height="50" rx="6" fill="none" stroke="#ff2db7" stroke-width="2.5"/>
    <path d="M 130 400 L 145 415 L 165 385" fill="none" stroke="#ff2db7" stroke-width="3.5" filter="url(#g)"/>
    <text x="210" y="385" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#ff2db7" letter-spacing="2">02</text>
    <text x="210" y="418" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="#ffffff">Produce your Travel Rule policy in writing</text>
    <text x="210" y="445" font-family="'Plus Jakarta Sans', sans-serif" font-size="14" fill="#a0aec0">With version control, sign-off date and an owner. The CASP that lost couldn't produce one when the Arbiter asked.</text>
  </g>

  <!-- Item 3 -->
  <g>
    <rect x="80" y="480" width="1440" height="120" rx="8" fill="#0a0510" stroke="#ff2db7" stroke-width="1.5" opacity="0.95"/>
    <rect x="120" y="515" width="50" height="50" rx="6" fill="none" stroke="#ff2db7" stroke-width="2.5"/>
    <path d="M 130 540 L 145 555 L 165 525" fill="none" stroke="#ff2db7" stroke-width="3.5" filter="url(#g)"/>
    <text x="210" y="525" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#ff2db7" letter-spacing="2">03</text>
    <text x="210" y="558" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="#ffffff">Re-verify whitelisted addresses</text>
    <text x="210" y="585" font-family="'Plus Jakarta Sans', sans-serif" font-size="14" fill="#a0aec0">Anything whitelisted on a tick-box alone needs re-verification before its next withdrawal. No grandfathering.</text>
  </g>

  <!-- Item 4 -->
  <g>
    <rect x="80" y="620" width="1440" height="120" rx="8" fill="#0a0510" stroke="#ff2db7" stroke-width="1.5" opacity="0.95"/>
    <rect x="120" y="655" width="50" height="50" rx="6" fill="none" stroke="#ff2db7" stroke-width="2.5"/>
    <path d="M 130 680 L 145 695 L 165 665" fill="none" stroke="#ff2db7" stroke-width="3.5" filter="url(#g)"/>
    <text x="210" y="665" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#ff2db7" letter-spacing="2">04</text>
    <text x="210" y="698" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="#ffffff">Build a scam-report response playbook</text>
    <text x="210" y="725" font-family="'Plus Jakarta Sans', sans-serif" font-size="14" fill="#a0aec0">Customer says "I think I've been scammed" → account auto-flags, in-flight transfers pause, withdrawals re-reviewed.</text>
  </g>

  <!-- Item 5 -->
  <g>
    <rect x="80" y="760" width="1440" height="120" rx="8" fill="#0a0510" stroke="#ff2db7" stroke-width="1.5" opacity="0.95"/>
    <rect x="120" y="795" width="50" height="50" rx="6" fill="none" stroke="#ff2db7" stroke-width="2.5"/>
    <path d="M 130 820 L 145 835 L 165 805" fill="none" stroke="#ff2db7" stroke-width="3.5" filter="url(#g)"/>
    <text x="210" y="805" font-family="'JetBrains Mono', monospace" font-size="14" font-weight="700" fill="#ff2db7" letter-spacing="2">05</text>
    <text x="210" y="838" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="#ffffff">Stop relying on warnings as a legal shield</text>
    <text x="210" y="865" font-family="'Plus Jakarta Sans', sans-serif" font-size="14" fill="#a0aec0">"Are you sure?" pop-ups don't discharge the Travel Rule duty. They sit alongside it. Evidence of awareness, not compliance.</text>
  </g>
</svg>
