<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 600" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="title desc">
  <title id="title">Valletta skyline at night — neon line art</title>
  <desc id="desc">A stylised neon-pink-on-black silhouette of the Valletta skyline showing the Carmelite Church dome, Anglican Pro-Cathedral spire, bastion walls, and the Grand Harbour reflection. Brand-aligned for the FLOR ONCHAIN pillar.</desc>

  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#05030a"/>
      <stop offset="0.55" stop-color="#0e0418"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>

    <linearGradient id="water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#08020e"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>

    <radialGradient id="moon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff2bd6" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#ff2bd6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#ff2bd6" stop-opacity="0"/>
    </radialGradient>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Sky -->
  <rect width="1600" height="500" fill="url(#sky)"/>

  <!-- Cyan haze at horizon -->
  <rect y="430" width="1600" height="80" fill="#00e0ff" opacity="0.04"/>
  <rect y="455" width="1600" height="55" fill="#ff2bd6" opacity="0.05"/>

  <!-- Stars -->
  <g fill="#ffffff">
    <circle cx="80"   cy="60"  r="0.8" opacity="0.7"/>
    <circle cx="180"  cy="120" r="1.0" opacity="0.5"/>
    <circle cx="260"  cy="40"  r="0.6" opacity="0.8"/>
    <circle cx="350"  cy="90"  r="1.2" opacity="0.7"/>
    <circle cx="440"  cy="55"  r="0.7" opacity="0.6"/>
    <circle cx="520"  cy="140" r="0.9" opacity="0.5"/>
    <circle cx="610"  cy="35"  r="1.0" opacity="0.7"/>
    <circle cx="700"  cy="100" r="0.6" opacity="0.6"/>
    <circle cx="780"  cy="60"  r="1.1" opacity="0.7"/>
    <circle cx="850"  cy="130" r="0.7" opacity="0.5"/>
    <circle cx="940"  cy="50"  r="0.9" opacity="0.7"/>
    <circle cx="1020" cy="110" r="0.7" opacity="0.6"/>
    <circle cx="1100" cy="40"  r="1.0" opacity="0.7"/>
    <circle cx="1180" cy="90"  r="0.8" opacity="0.5"/>
    <circle cx="1260" cy="35"  r="0.6" opacity="0.7"/>
    <circle cx="1340" cy="140" r="1.0" opacity="0.6"/>
    <circle cx="1500" cy="55"  r="0.9" opacity="0.7"/>
    <circle cx="1560" cy="100" r="0.7" opacity="0.5"/>
  </g>

  <!-- Moon glow (offset right) -->
  <circle cx="1380" cy="130" r="120" fill="url(#moon)"/>
  <circle cx="1380" cy="130" r="42" fill="none" stroke="#ff2bd6" stroke-width="1" opacity="0.55" filter="url(#glow)"/>
  <circle cx="1380" cy="130" r="42" fill="#0a0314" opacity="0.6"/>
  <circle cx="1380" cy="130" r="42" fill="none" stroke="#ff60e6" stroke-width="0.8" opacity="0.85"/>

  <!-- ============ FAR DISTANCE (faint silhouette) ============ -->
  <g opacity="0.35" fill="#ff2bd6">
    <rect x="0"   y="395" width="60"  height="105"/>
    <rect x="60"  y="385" width="80"  height="115"/>
    <rect x="140" y="400" width="40"  height="100"/>
    <rect x="180" y="380" width="60"  height="120"/>
    <rect x="1450" y="395" width="60" height="105"/>
    <rect x="1510" y="380" width="90" height="120"/>
  </g>

  <!-- ============ MAIN SKYLINE (mid-distance) ============ -->
  <!-- All silhouettes filled black with neon pink outlines -->

  <g fill="#000000" stroke="#ff2bd6" stroke-width="1.6" filter="url(#glow)">

    <!-- Bastion wall baseline (jagged fortifications) -->
    <path d="
      M 0 500
      L 0 460
      L 40 460 L 40 450 L 90 450 L 90 460
      L 130 460 L 130 445 L 170 445 L 170 460
      L 220 460 L 220 450 L 270 450 L 270 460
      L 320 460 L 320 442 L 360 442 L 360 460
      L 410 460 L 410 450 L 450 450 L 450 460
      L 500 460 L 500 445 L 540 445 L 540 460
      L 590 460 L 590 442 L 630 442 L 630 460
      L 690 460 L 690 450 L 740 450 L 740 460
      L 800 460 L 800 444 L 840 444 L 840 460
      L 890 460 L 890 450 L 940 450 L 940 460
      L 990 460 L 990 442 L 1030 442 L 1030 460
      L 1080 460 L 1080 450 L 1130 450 L 1130 460
      L 1180 460 L 1180 444 L 1220 444 L 1220 460
      L 1280 460 L 1280 450 L 1330 450 L 1330 460
      L 1380 460 L 1380 442 L 1420 442 L 1420 460
      L 1480 460 L 1480 450 L 1530 450 L 1530 460
      L 1600 460 L 1600 500 Z
    "/>

    <!-- Block of buildings (left) -->
    <rect x="40"  y="370" width="60"  height="90"/>
    <rect x="100" y="350" width="40"  height="110"/>
    <rect x="140" y="380" width="55"  height="80"/>
    <rect x="195" y="335" width="35"  height="125"/>
    <rect x="230" y="365" width="50"  height="95"/>

    <!-- ANGLICAN PRO-CATHEDRAL SPIRE (left of centre, very tall, thin) -->
    <rect x="295" y="280" width="50" height="180"/>
    <!-- spire base widening -->
    <polygon points="290,280 350,280 345,260 295,260"/>
    <!-- spire tower -->
    <rect x="307" y="180" width="26" height="80"/>
    <!-- pointed spire -->
    <polygon points="307,180 333,180 320,100"/>
    <!-- cross on top -->
    <line x1="320" y1="100" x2="320" y2="78" stroke="#ff60e6" stroke-width="2"/>
    <line x1="313" y1="86" x2="327" y2="86" stroke="#ff60e6" stroke-width="2"/>

    <!-- Buildings between spire and main dome -->
    <rect x="350" y="370" width="60" height="90"/>
    <rect x="410" y="350" width="50" height="110"/>
    <rect x="460" y="380" width="45" height="80"/>
    <rect x="505" y="345" width="55" height="115"/>
    <rect x="560" y="365" width="40" height="95"/>

    <!-- CARMELITE CHURCH DOME (the iconic big dome, centre-left) -->
    <rect x="600" y="320" width="200" height="140"/>
    <!-- Drum (round base of dome) -->
    <rect x="630" y="270" width="140" height="55"/>
    <!-- Dome body (semicircle) -->
    <path d="M 630 270 Q 700 130 770 270 Z"/>
    <!-- Lantern on top of dome -->
    <rect x="690" y="115" width="20" height="35"/>
    <!-- Spire/cross on lantern -->
    <line x1="700" y1="115" x2="700" y2="80" stroke="#ff60e6" stroke-width="2"/>
    <line x1="694" y1="92" x2="706" y2="92" stroke="#ff60e6" stroke-width="2"/>

    <!-- Buildings between dome and right side -->
    <rect x="800" y="365" width="50" height="95"/>
    <rect x="850" y="345" width="60" height="115"/>
    <rect x="910" y="375" width="45" height="85"/>
    <rect x="955" y="355" width="55" height="105"/>

    <!-- ST JOHN'S CO-CATHEDRAL TOWERS (twin bell towers, right of centre) -->
    <rect x="1010" y="305" width="120" height="155"/>
    <!-- Left bell tower -->
    <rect x="1015" y="240" width="35" height="70"/>
    <polygon points="1015,240 1050,240 1032,200"/>
    <!-- Right bell tower -->
    <rect x="1090" y="240" width="35" height="70"/>
    <polygon points="1090,240 1125,240 1107,200"/>

    <!-- Buildings between cathedral and right edge -->
    <rect x="1130" y="370" width="55" height="90"/>
    <rect x="1185" y="350" width="45" height="110"/>
    <rect x="1230" y="375" width="50" height="85"/>

    <!-- Auberge / governmental block (tall right element) -->
    <rect x="1280" y="320" width="90" height="140"/>
    <!-- Crenellation / parapet detail -->
    <rect x="1280" y="312" width="10" height="10"/>
    <rect x="1300" y="312" width="10" height="10"/>
    <rect x="1320" y="312" width="10" height="10"/>
    <rect x="1340" y="312" width="10" height="10"/>
    <rect x="1360" y="312" width="10" height="10"/>

    <!-- Right-side buildings descending to Fort St Elmo -->
    <rect x="1370" y="365" width="50" height="95"/>
    <rect x="1420" y="380" width="45" height="80"/>

    <!-- Fort St Elmo (low fortification block far right) -->
    <rect x="1465" y="395" width="135" height="65"/>
    <rect x="1465" y="385" width="10" height="10"/>
    <rect x="1485" y="385" width="10" height="10"/>
    <rect x="1505" y="385" width="10" height="10"/>
    <rect x="1525" y="385" width="10" height="10"/>
    <rect x="1545" y="385" width="10" height="10"/>
    <rect x="1565" y="385" width="10" height="10"/>
    <rect x="1585" y="385" width="10" height="10"/>
  </g>

  <!-- Window lights (small warm dots) -->
  <g fill="#ff60e6" filter="url(#glow)">
    <rect x="55"  y="395" width="2.5" height="2.5" opacity="0.7"/>
    <rect x="78"  y="410" width="2.5" height="2.5" opacity="0.5"/>
    <rect x="115" y="395" width="2.5" height="2.5" opacity="0.6"/>
    <rect x="115" y="420" width="2.5" height="2.5" opacity="0.7"/>
    <rect x="160" y="410" width="2.5" height="2.5" opacity="0.5"/>
    <rect x="210" y="385" width="2.5" height="2.5" opacity="0.7"/>
    <rect x="245" y="395" width="2.5" height="2.5" opacity="0.6"/>
    <rect x="365" y="395" width="2.5" height="2.5" opacity="0.7"/>
    <rect x="425" y="380" width="2.5" height="2.5" opacity="0.6"/>
    <rect x="475" y="410" width="2.5" height="2.5" opacity="0.5"/>
    <rect x="525" y="385" width="2.5" height="2.5" opacity="0.7"/>
    <rect x="575" y="395" width="2.5" height="2.5" opacity="0.6"/>
    <rect x="635" y="370" width="2.5" height="2.5" opacity="0.7"/>
    <rect x="660" y="395" width="2.5" height="2.5" opacity="0.5"/>
    <rect x="690" y="370" width="2.5" height="2.5" opacity="0.7"/>
    <rect x="720" y="395" width="2.5" height="2.5" opacity="0.6"/>
    <rect x="755" y="370" width="2.5" height="2.5" opacity="0.7"/>
    <rect x="820" y="400" width="2.5" height="2.5" opacity="0.5"/>
    <rect x="865" y="385" width="2.5" height="2.5" opacity="0.7"/>
    <rect x="925" y="410" width="2.5" height="2.5" opacity="0.5"/>
    <rect x="975" y="385" width="2.5" height="2.5" opacity="0.7"/>
    <rect x="1030" y="350" width="2.5" height="2.5" opacity="0.6"/>
    <rect x="1060" y="370" width="2.5" height="2.5" opacity="0.7"/>
    <rect x="1095" y="350" width="2.5" height="2.5" opacity="0.6"/>
    <rect x="1145" y="395" width="2.5" height="2.5" opacity="0.7"/>
    <rect x="1200" y="385" width="2.5" height="2.5" opacity="0.5"/>
    <rect x="1245" y="410" width="2.5" height="2.5" opacity="0.6"/>
    <rect x="1295" y="350" width="2.5" height="2.5" opacity="0.7"/>
    <rect x="1325" y="370" width="2.5" height="2.5" opacity="0.6"/>
    <rect x="1355" y="395" width="2.5" height="2.5" opacity="0.7"/>
    <rect x="1390" y="395" width="2.5" height="2.5" opacity="0.6"/>
    <rect x="1435" y="410" width="2.5" height="2.5" opacity="0.5"/>
    <rect x="1480" y="425" width="2.5" height="2.5" opacity="0.6"/>
    <rect x="1525" y="425" width="2.5" height="2.5" opacity="0.7"/>
  </g>

  <!-- ============ WATER ============ -->
  <rect y="500" width="1600" height="100" fill="url(#water)"/>

  <!-- Reflection band -->
  <g opacity="0.25">
    <rect x="200" y="510" width="3" height="40" fill="#ff2bd6"/>
    <rect x="320" y="515" width="3" height="35" fill="#ff2bd6"/>
    <rect x="450" y="510" width="3" height="40" fill="#ff60e6"/>
    <rect x="610" y="510" width="3" height="50" fill="#ff2bd6"/>
    <rect x="700" y="515" width="3" height="45" fill="#ff60e6"/>
    <rect x="800" y="510" width="3" height="40" fill="#ff2bd6"/>
    <rect x="950" y="515" width="3" height="35" fill="#ff60e6"/>
    <rect x="1080" y="510" width="3" height="50" fill="#ff2bd6"/>
    <rect x="1200" y="515" width="3" height="40" fill="#ff60e6"/>
    <rect x="1330" y="510" width="3" height="45" fill="#ff2bd6"/>
    <rect x="1380" y="510" width="3" height="60" fill="#ff60e6"/>
    <rect x="1480" y="515" width="3" height="35" fill="#ff2bd6"/>
  </g>

  <!-- Horizon line (water meets land) -->
  <line x1="0" y1="500" x2="1600" y2="500" stroke="#ff2bd6" stroke-width="0.5" opacity="0.7"/>

  <!-- ============ TINY WORDMARK (bottom right) ============ -->
  <text x="1570" y="585" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="2" fill="#ff2bd6" opacity="0.55">VALLETTA · MALTA</text>
</svg>
