<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 1600 800" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title">
  <title id="title">Verification flow comparison: tick-box self-declaration (fails) vs Satoshi test / signed message / wallet attribution (compliant)</title>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a0510"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <filter id="g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1600" height="800" fill="url(#bg)"/>

  <!-- Header -->
  <text x="800" y="55" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="26" font-weight="700" fill="#ffffff" letter-spacing="2">SELF-HOSTED WALLET VERIFICATION</text>
  <text x="800" y="85" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#00f0ff" opacity="0.85">EBA Travel Rule Guidelines · transfers above €1,000</text>

  <!-- Vertical divider -->
  <line x1="800" y1="130" x2="800" y2="720" stroke="#1f1f1f" stroke-width="1" stroke-dasharray="4 6"/>

  <!-- ======== LEFT COLUMN: TICK-BOX (fails) ======== -->
  <g>
    <!-- Column header -->
    <rect x="80" y="130" width="660" height="50" rx="6" fill="#000000" stroke="#ff3b3b" stroke-width="2" filter="url(#g)"/>
    <text x="410" y="162" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="18" font-weight="700" fill="#ff3b3b" letter-spacing="2">PARA 78 ONLY · INSUFFICIENT</text>

    <!-- The method -->
    <rect x="80" y="220" width="660" height="220" rx="8" fill="#0a0510" stroke="#ff3b3b" stroke-width="1.5"/>
    <text x="410" y="260" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="20" font-weight="600" fill="#ffffff">Tick-Box Self-Declaration</text>
    <text x="410" y="290" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" fill="#a0aec0">Customer asserts ownership on a form. CASP collects no proof.</text>

    <!-- visual: form with checkbox -->
    <rect x="180" y="320" width="460" height="100" rx="6" fill="#000000" stroke="#2a2a2a" stroke-width="1"/>
    <rect x="210" y="350" width="22" height="22" rx="3" fill="none" stroke="#ff3b3b" stroke-width="2"/>
    <path d="M 214 363 L 220 369 L 228 355" fill="none" stroke="#ff3b3b" stroke-width="2.5"/>
    <text x="245" y="367" font-family="'Plus Jakarta Sans', sans-serif" font-size="14" fill="#f5f5f5">I confirm I own the destination wallet</text>
    <text x="245" y="395" font-family="'JetBrains Mono', monospace" font-size="11" fill="#6b7280">Signature: ___________________</text>

    <!-- Outcome -->
    <rect x="80" y="475" width="660" height="180" rx="8" fill="#1a0510" stroke="#ff3b3b" stroke-width="2"/>
    <text x="410" y="510" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#ff3b3b" font-weight="700" letter-spacing="2">RESULT</text>
    <text x="410" y="555" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="#ff3b3b">Civil Liability + AML Breach</text>
    <text x="410" y="595" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="14" fill="#a0aec0">Arbiter: contractual terms cannot absolve a CASP</text>
    <text x="410" y="620" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="14" fill="#a0aec0">from its statutory Travel Rule obligations.</text>
  </g>

  <!-- ======== RIGHT COLUMN: VERIFIED METHODS (compliant) ======== -->
  <g>
    <!-- Column header -->
    <rect x="860" y="130" width="660" height="50" rx="6" fill="#000000" stroke="#ff2db7" stroke-width="2" filter="url(#g)"/>
    <text x="1190" y="162" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="18" font-weight="700" fill="#ff2db7" letter-spacing="2">PARAS 83–86 · COMPLIANT</text>

    <!-- Methods box -->
    <rect x="860" y="220" width="660" height="220" rx="8" fill="#0a0510" stroke="#ff2db7" stroke-width="1.5"/>
    <text x="1190" y="260" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="20" font-weight="600" fill="#ffffff">Pick at least ONE</text>

    <!-- Method 1: Satoshi test -->
    <g>
      <circle cx="900" cy="300" r="14" fill="none" stroke="#ff2db7" stroke-width="2"/>
      <text x="900" y="305" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#ff2db7" font-weight="700">1</text>
      <text x="930" y="295" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="600" fill="#ffffff">Satoshi Test</text>
      <text x="930" y="316" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" fill="#a0aec0">Customer sends micro-amount from destination wallet</text>
    </g>

    <!-- Method 2: Signed Message -->
    <g>
      <circle cx="900" cy="350" r="14" fill="none" stroke="#ff2db7" stroke-width="2"/>
      <text x="900" y="355" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#ff2db7" font-weight="700">2</text>
      <text x="930" y="345" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="600" fill="#ffffff">Signed Message</text>
      <text x="930" y="366" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" fill="#a0aec0">Cryptographic signature with the wallet's private key</text>
    </g>

    <!-- Method 3: Source code -->
    <g>
      <circle cx="900" cy="400" r="14" fill="none" stroke="#ff2db7" stroke-width="2"/>
      <text x="900" y="405" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#ff2db7" font-weight="700">3</text>
      <text x="930" y="395" font-family="'Space Grotesk', sans-serif" font-size="15" font-weight="600" fill="#ffffff">Manual Signature in Source Code</text>
      <text x="930" y="416" font-family="'Plus Jakarta Sans', sans-serif" font-size="12" fill="#a0aec0">For smart-contract wallets: embedded identifier</text>
    </g>

    <!-- Method 4: Equivalent -->
    <g>
      <circle cx="900" cy="425" r="0"/>
    </g>

    <!-- Outcome -->
    <rect x="860" y="475" width="660" height="180" rx="8" fill="#0a1a18" stroke="#ff2db7" stroke-width="2"/>
    <text x="1190" y="510" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="13" fill="#ff2db7" font-weight="700" letter-spacing="2">RESULT</text>
    <text x="1190" y="555" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="22" font-weight="700" fill="#ff2db7">Compliant + Defensible</text>
    <text x="1190" y="595" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="14" fill="#a0aec0">Documented verification stands up before the FIAU,</text>
    <text x="1190" y="620" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="14" fill="#a0aec0">the MFSA, and the Arbiter.</text>
  </g>

  <!-- Bottom annotation -->
  <text x="800" y="730" text-anchor="middle" font-family="'Plus Jakarta Sans', sans-serif" font-size="13" fill="#6b7280">EBA Travel Rule Guidelines · adopted by the FIAU into Maltese AML law on 30 December 2024</text>
</svg>
